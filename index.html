<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Infobox Generator</title>
</head>
<body>
    <h1>Election Infobox Generator</h1>
    <form>
        <label for="electionName">Election Name:</label>
        <input type="text" id="electionName" name="electionName" required>
        <br>
        <label for="electionDate">Election Date:</label>
        <input type="date" id="electionDate" name="electionDate" required>
        <br>
        <input type="submit" value="Generate Infobox">
    </form>
</body>
</html>
